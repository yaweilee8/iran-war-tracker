        * {

        }

        }
        
        .header p {

            font-size: 1.1em;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-item {
            text-align: center;
        }

            opacity: 0.7;
            margin-bottom: 5px;
        }

            font-weight: bold;
            color: #ff6b6b;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #c41e3a, #8b0000);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        
        .timeline-item:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.08);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 25px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c41e3a;
            border: 3px solid #1a1a2e;
        }
        
        .timeline-item.urgent::before {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
        
        .time {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .content {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 10px;
        }
        
        .source {
            font-size: 0.85em;
            color: #666;
        }
        
        .source a {
            color: #4da6ff;
            text-decoration: none;
        }
        
        .source a:hover {
            text-decoration: underline;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            margin-right: 8px;
            margin-top: 10px;
        }
        
        .tag.military {
            background: #8b0000;
            color: #fff;
        }
        
        .tag.diplomacy {
            background: #1e3a8b;
            color: #fff;
        }
        
        .tag.economy {
            background: #065f46;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 50px;
            color: #666;
        }
        
        .update-time {
            text-align: center;
            padding: 15px;
            background: rgba(196, 30, 58, 0.1);
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(196, 30, 58, 0.3);
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .status-bar {
                gap: 15px;
            }

                padding-left: 20px;
            }
            
            .timeline-item::before {
                left: -26px;
            }

        // 渲染时间线
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = newsData.map(item => {
                // 视频类型
                if (item.type === 'video') {
                    return `
                        <div class="timeline-item video" style="background: linear-gradient(135deg, rgba(196, 30, 58, 0.1) 0%, rgba(0,0,0,0.2) 100%); border-left: 4px solid #ff0000;">
                            <div class="time">📺 ${item.time} · 🎥 YouTube 视频</div>
                            <div style="display: flex; gap: 15px; margin: 10px 0;">
                                <a href="${item.sourceUrl}" target="_blank" style="flex-shrink: 0;">
                                    <img src="${item.thumbnail}" alt="视频缩略图" style="width: 160px; height: 90px; object-fit: cover; border-radius: 8px; cursor: pointer;">
                                </a>
                                <div style="flex: 1;">
                                    <a href="${item.sourceUrl}" target="_blank" style="text-decoration: none; color: inherit;">
                                        <div class="title" style="margin-top: 0;">▶️ ${item.title}</div>
                                    </a>
                                    <div style="margin-top: 10px; display: flex; gap: 10px;">
                                        <a href="${item.sourceUrl}" target="_blank" style="background: #c41e3a; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 0.9em; display: inline-block;">▶️ 在 YouTube 观看</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                // 新闻类型（原有代码）
                return `
                    <div class="timeline-item ${item.urgent ? 'urgent' : ''}" onclick="window.open('${item.sourceUrl}', '_blank')" style="cursor: pointer;">
                        <div class="time">📅 ${item.time}</div>
                        <div class="title">${item.urgent ? '🔴 ' : ''}${item.title}</div>
                        <div class="content">${item.content}</div>
                        <div class="source">
                            📰 来源：<a href="${item.sourceUrl}" target="_blank" onclick="event.stopPropagation()">${item.source}</a>
                        </div>
                        <div>
                            ${item.tags.map(tag => `<span class="tag ${tag}">${getTagLabel(tag)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getTagLabel(tag) {
            const labels = {
                'military': '军事',
                'diplomacy': '外交',
                'economy': '经济'
            };
            return labels[tag] || tag;
        }
        
        // 计算战争天数
        function calculateWarDays() {
            const startDate = new Date('2026-02-28'); // 假设战争开始日期
            const now = new Date();
            const diff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('days').textContent = diff;
            document.getElementById('war-day').textContent = diff;
        }
        
        // 更新最后更新时间
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', { 
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('last-update').textContent = timeString + ' (GMT+8)';
        }
        
        // 初始化
        renderTimeline();
        calculateWarDays();
        updateTime();
        
        // 每分钟更新时间
        setInterval(updateTime, 60000);
