            content: '';

            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #c41e3a, #8b0000);

            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        
        .timeline-item:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.08);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 25px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c41e3a;
            border: 3px solid #1a1a2e;
        }
        
        .timeline-item.urgent::before {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
        
        .time {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .content {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 10px;
        }
        
        .source {
            font-size: 0.85em;
            color: #666;
        }
        
        .source a {
            color: #4da6ff;
            text-decoration: none;
        }
        
        .source a:hover {
            text-decoration: underline;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            margin-right: 8px;
            margin-top: 10px;
        }
        
        .tag.military {
            background: #8b0000;
            color: #fff;
        }
        
        .tag.diplomacy {
            background: #1e3a8b;
            color: #fff;
        }
        
        .tag.economy {
            background: #065f46;
            color: #fff;

            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 50px;
            color: #666;

            margin-bottom: 30px;

        }

            .header h1 {
                font-size: 1.8em;
            }

            }

            }

        // 渲染时间线
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = newsData.map(item => `
                <div class="timeline-item ${item.urgent ? 'urgent' : ''}">
                    <div class="time">📅 ${item.time}</div>
                    <div class="title">${item.urgent ? '🔴 ' : ''}${item.title}</div>
                    <div class="content">${item.content}</div>
                    <div class="source">
                        📰 来源：<a href="${item.sourceUrl}" target="_blank">${item.source}</a>
                    </div>
                    <div>
                        ${item.tags.map(tag => `<span class="tag ${tag}">${getTagLabel(tag)}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function getTagLabel(tag) {
            const labels = {
                'military': '军事',
                'diplomacy': '外交',
                'economy': '经济'
            };
            return labels[tag] || tag;
        }
        
        // 计算战争天数
        function calculateWarDays() {
            const startDate = new Date('2026-02-28'); // 假设战争开始日期
            const now = new Date();
            const diff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('days').textContent = diff;
            document.getElementById('war-day').textContent = diff;
        }
        
        // 更新最后更新时间
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', { 
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('last-update').textContent = timeString + ' (GMT+8)';
        }
        
        // 初始化
        renderTimeline();
        calculateWarDays();
        updateTime();
        
        // 每分钟更新时间
